# https://github.com/marketplace/actions/create-issue-branch#option-2-configure-github-action
name: Issues worflow

on:
  issues:
    types: [ opened ]
  pull_request:
    types: [ opened, closed ]

jobs:
  create_issue_branch_job:
    runs-on: ubuntu-latest
    steps:
      - name: Create Issue Branch
        uses: robvanderleek/create-issue-branch@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
